services:
  orchestrator:
    image: __REGISTRY__/__NAMESPACE__/mmorpg-orchestrator:__VERSION__
    container_name: mmorpg-orchestrator
    # Host networking: orchestrator listens on a host port for QUIC heartbeats
    # from DSes running on remote fleet-ds VMs.
    network_mode: host
    env_file:
      - /etc/default/mmorpg-orchestrator
    environment:
      SPAWNER: "remote-docker"
      DS_DOCKER_IMAGE: "__REGISTRY__/__NAMESPACE__/mmorpg-dedicated-server:__VERSION__"
    restart: unless-stopped
